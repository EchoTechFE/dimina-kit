<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>popout-spike view</title>
    <style>
      html, body { margin: 0; height: 100%; font-family: -apple-system, sans-serif; }
      body { display: flex; align-items: center; justify-content: center; background: #1e1e2e; color: #cdd6f4; }
      #box { text-align: center; }
      #marker { font-size: 12px; opacity: 0.6; }
      #tick { font-size: 48px; font-variant-numeric: tabular-nums; }
    </style>
  </head>
  <body>
    <div id="box">
      <div id="tick">0</div>
      <div id="marker"></div>
    </div>
    <script>
      // A per-LOAD identity stamp. If the page is reloaded during a popout/pop-back,
      // this regenerates and the harness's assertion (marker unchanged) FAILS — so it
      // is a live, falsifiable proof that the WebContents kept its document context
      // across the migration (no reload).
      window.__popoutMarker =
        'marker-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 8)
      document.getElementById('marker').textContent = window.__popoutMarker

      // A live, monotonically increasing counter driven by the page's own event loop.
      // The harness samples it across the migration; a reload would reset it to ~0.
      window.__tick = 0
      setInterval(() => {
        window.__tick += 1
        document.getElementById('tick').textContent = String(window.__tick)
      }, 50)
    </script>
  </body>
</html>
