<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dimina DevTools — Project Window Layers</title>
<style>
  :root {
    --color-bg:               hsl(  0  0%   7%);
    --color-bg-panel:         hsl(  0  0%  12%);

    --color-window:           hsl(  0  0%  26%);
    --color-window-border:    hsl(  0  0%  62%);
    --color-view-border:      hsl(  0  0%  78%);
    --color-webcontents:      hsl(  0  0%  32%);
    --color-webcontents-border: hsl(  0  0%  72%);
    --color-webview:          hsl(  0  0%   4%);
    --color-webview-border:   hsl(  0  0%  92%);

    --color-devtools:         hsl(220  10%  18%);
    --color-devtools-border:  hsl(220  20%  70%);
    --color-settings:         hsl(  0  0%  18%);
    --color-settings-border:  hsl(180  35%  65%);
    --color-popover-fill:     hsl(  0  0%   0% / 0.50);
    --color-popover-border:   hsl(  0  85%  70%);

    --color-toolbar:          hsl(249 100%  67% / 0.30);
    --color-toolbar-border:   hsl(249 100%  72%);
    --color-sim-region:       hsl(  0  0%  18%);
    --color-right-region:     hsl(  0  0%  34%);

    --color-text:             hsl(  0  0%  95%);
    --color-text-secondary:   hsl(  0  0%  70%);
    --color-text-muted:       hsl(  0  0%  52%);

    --color-accent:           hsl(249 100%  67%);
    --color-cdp:              hsl(160  72%  60%);
    --color-cdp-soft:         hsl(160  72%  60% / 0.20);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0;
    background: var(--color-bg);
    color: var(--color-text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    font-size: 14px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  .page-grid {
    min-height: 100vh;
    display: grid;
    grid-template-columns: minmax(0, 1fr) 320px;
    padding: 48px 56px;
    gap: 40px;
  }
  @media (max-width: 1000px) {
    .page-grid { grid-template-columns: 1fr; padding: 32px 24px; gap: 24px; }
  }

  /* ── Stage ────────────────────────────────────────────────────────── */
  .stage {
    position: relative;
    height: 1200px;
    perspective: 2800px;
    perspective-origin: 50% 38%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .stack {
    position: relative;
    width: 760px;
    height: 520px;
    transform-style: preserve-3d;
    transform: rotateX(56deg) rotateZ(-30deg) scale(1.45);
    transition: transform 1.4s cubic-bezier(0.7, 0, 0.2, 1);
  }
  /* Face-on (flat) state: all layers stack directly facing viewer.
     translateZ is zeroed out so perspective doesn't enlarge higher-Z layers
     and push them outside their intended bounds. */
  .stack.flat {
    transform: rotateX(0deg) rotateZ(0deg) scale(1.45);
  }
  .stack.flat .layer { transform: translateZ(0); }
  /* Back-faces only make sense in 3D view; hide them when flat */
  .layer > .back-face {
    transition: opacity 1.4s cubic-bezier(0.7, 0, 0.2, 1);
  }
  .stack.flat .layer > .back-face { opacity: 0; }
  .layer {
    position: absolute;
    border-radius: 4px;
    transition: opacity 220ms ease, box-shadow 220ms ease, transform 1.4s cubic-bezier(0.7, 0, 0.2, 1);
    transform-style: preserve-3d;
    will-change: transform, opacity;
    box-shadow: 0 18px 44px hsl(0 0% 0% / 0.6);
  }
  .layer.is-hidden { opacity: 0 !important; pointer-events: none; }
  .layer.is-hidden .back-face { display: none; }

  /* Subtle depth: a darker back face peeking behind each filled layer.
     Pure CSS perspective; no faked side walls. */
  .layer > .back-face {
    position: absolute;
    inset: 0;
    background: var(--bg, transparent);
    border: 1.5px solid var(--bd, hsl(0 0% 30%));
    border-radius: inherit;
    transform: translateZ(-10px);
    filter: brightness(0.5);
    pointer-events: none;
  }
  .layer-contentview > .back-face,
  .layer-popover > .back-face { display: none; }

  .layer .label {
    position: absolute;
    left: 14px; bottom: 8px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 12.5px;
    font-weight: 500;
    color: var(--color-text);
    letter-spacing: 0.02em;
    user-select: none;
    pointer-events: none;
    text-shadow: 0 2px 10px hsl(0 0% 0% / 0.95), 0 0 2px hsl(0 0% 0% / 0.9);
  }
  .layer .label.lg { font-size: 14.5px; left: 22px; bottom: 14px; font-weight: 600; }

  /* L0 BrowserWindow */
  .layer-window {
    --bg: var(--color-window);
    --bd: var(--color-window-border);
    inset: 0; transform: translateZ(0);
    background: var(--bg);
    border: 1.5px solid var(--bd);
  }
  .layer-window .titlebar {
    position: absolute; left: 0; right: 0; top: 0; height: 22px;
    background: hsl(0 0% 10%);
    border-bottom: 1px solid hsl(0 0% 30%);
    border-radius: 4px 4px 0 0;
  }
  .layer-window .traffic {
    position: absolute; left: 12px; top: 8px; width: 42px; height: 7px;
    background:
      radial-gradient(circle, hsl(0 70% 60%) 0 3.2px, transparent 3.6px) 0 0/14px 7px no-repeat,
      radial-gradient(circle, hsl(45 80% 55%) 0 3.2px, transparent 3.6px) 14px 0/14px 7px no-repeat,
      radial-gradient(circle, hsl(135 50% 55%) 0 3.2px, transparent 3.6px) 28px 0/14px 7px no-repeat;
  }

  /* L1 contentView (empty View container) */
  .layer-contentview {
    inset: 28px 8px 8px 8px;
    transform: translateZ(55px);
    background: transparent;
    border: 1.5px dashed var(--color-view-border);
    box-shadow: none;
  }
  .layer-contentview .label { color: var(--color-text-secondary); }

  /* L2 WebContentsView · main (loads index.html) */
  .layer-mainweb {
    --bg: var(--color-webcontents);
    --bd: var(--color-webcontents-border);
    inset: 36px 14px 14px 14px;
    transform: translateZ(110px);
    background: var(--bg);
    border: 1.5px solid var(--bd);
  }

  /* React DOM regions on z2 surface — visually separated by split lines, no labels */
  .dom-toolbar {
    position: absolute;
    left: 0; right: 0; top: 0;
    height: 42px;
    background: var(--color-toolbar);
    border-bottom: 1.5px solid var(--color-toolbar-border);
    display: flex; align-items: center; padding: 0 12px; gap: 10px;
  }
  .dom-toolbar .btn {
    height: 20px; padding: 0 8px;
    border: 1px solid var(--color-toolbar-border);
    border-radius: 2px;
    background: hsl(0 0% 14% / 0.7);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 10px; color: var(--color-text);
    display: flex; align-items: center;
  }
  .dom-toolbar .spacer { flex: 1; }

  /* Default 'inEditor' layout: fixed-width simulator COLUMN on the left, with
     a vertical splitter on its trailing (right) edge; to its right a column
     split vertically into the Monaco editor (top) over the bottom debug panel.
     Sim column width is fixed-px (~44% of stack here); editor/debug split 70/30. */

  /* Vertical splitter between the simulator column and the editor/debug column */
  .dom-splitter {
    position: absolute;
    top: 50px; bottom: 8px;
    left: 44%;
    width: 1.5px;
    background: hsl(0 0% 60%);
    transform: translateX(-50%);
  }
  /* Horizontal splitter between the editor (top) and the bottom debug panel */
  .dom-hsplitter {
    position: absolute;
    left: 44%; right: 0;
    top: 70%;
    height: 1.5px;
    background: hsl(0 0% 60%);
  }

  .dom-sim-region {
    position: absolute;
    left: 0; top: 42px; bottom: 0;
    width: 44%;
  }
  .dom-sim-region .topbar {
    position: absolute; left: 8px; right: 8px; top: 8px; height: 22px;
    display: flex; align-items: center; gap: 6px;
  }
  .dom-sim-region .topbar .sel {
    width: 70px; height: 14px;
    border: 1px solid hsl(0 0% 50%); border-radius: 2px;
    background: hsl(0 0% 12%);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 7.5px; color: hsl(0 0% 75%);
    display: flex; align-items: center; justify-content: center;
  }
  .dom-sim-region .webview-slot {
    position: absolute; inset: 38px 32px 24px 32px;
    border: 1.5px dashed hsl(0 0% 55%); border-radius: 12px;
  }
  .dom-sim-region .bottom {
    position: absolute; left: 8px; right: 8px; bottom: 6px;
    height: 16px;
    border-top: 1px solid hsl(0 0% 30%);
    color: hsl(0 0% 55%); font-size: 9px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    padding-top: 3px; text-indent: 4px;
  }

  /* Editor (Monaco) cell — plain React DOM, top of the right column */
  .dom-editor-region {
    position: absolute;
    left: 44%; right: 0; top: 42px;
    height: calc(70% - 42px);
  }
  .dom-editor-region .gutter {
    position: absolute; left: 0; top: 0; bottom: 0; width: 24px;
    border-right: 1px solid hsl(0 0% 28%);
    background: hsl(0 0% 14%);
  }
  .dom-editor-region .code {
    position: absolute; left: 34px; right: 14px; top: 10px; bottom: 10px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .dom-editor-region .code i {
    display: block; height: 5px;
    background: hsl(0 0% 50%); border-radius: 1px;
  }
  .dom-editor-region .code i:nth-child(1) { width: 40%; }
  .dom-editor-region .code i:nth-child(2) { width: 70%; margin-left: 14px; }
  .dom-editor-region .code i:nth-child(3) { width: 55%; margin-left: 14px; }
  .dom-editor-region .code i:nth-child(4) { width: 30%; }
  .dom-editor-region .code i:nth-child(5) { width: 60%; margin-left: 14px; }
  /* Caption: the editor is the one cell with NO companion native layer —
     it's pure in-renderer DOM (was a dmieditor:// WebContentsView overlay). */
  .dom-editor-region .region-note {
    position: absolute; right: 10px; bottom: 6px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 8px; color: hsl(0 0% 52%);
    letter-spacing: 0.02em;
  }

  /* Bottom debug panel — WXML / AppData / Storage / Console tabs (Console is the
     native DevTools overlay placeholder, anchored via ViewAnchor). */
  .dom-debug-region {
    position: absolute;
    left: 44%; right: 0; bottom: 0;
    top: 70%;
  }
  .dom-debug-region .tabs-bar {
    position: absolute; left: 12px; right: 12px; top: 4px;
    height: 18px;
    display: flex; gap: 12px;
    border-bottom: 1px solid hsl(0 0% 55%);
    align-items: center;
  }
  .dom-debug-region .tabs-bar span {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 8.5px; color: hsl(0 0% 82%);
    padding-bottom: 3px; position: relative;
  }
  .dom-debug-region .tabs-bar span.active { color: var(--color-accent); }
  .dom-debug-region .tabs-bar span.active::after {
    content: ""; position: absolute;
    left: 0; right: 0; bottom: -1px;
    height: 2px; background: var(--color-accent);
    border-radius: 1px;
  }
  .dom-debug-region .rows {
    position: absolute; left: 14px; right: 14px; top: 26px; bottom: 8px;
    display: flex; flex-direction: column; gap: 5px;
  }
  .dom-debug-region .rows i {
    display: block; height: 5px;
    background: hsl(0 0% 56%); border-radius: 1px;
  }
  .dom-debug-region .rows i:nth-child(2) { width: 60%; }
  .dom-debug-region .rows i:nth-child(3) { width: 75%; }

  /* L3 <webview> simulator guest WebContents (embedded in SimulatorPanel)
     Covers the simulator panel's webview region on z2's surface.
     Sim column is the left ~44% of the mainweb content area (left=14, width≈322).
     webview-slot inset 38 32 24 32 → stack coords (14+32, 78+38) ≈ (46, 116),
     258 wide, phone-tall. */
  .layer-webview {
    --bg: var(--color-webview);
    --bd: var(--color-webview-border);
    top: 116px; left: 46px;
    width: 258px; height: 366px;
    transform: translateZ(160px);
    background: var(--bg);
    border: 1.5px solid var(--bd);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
  }
  .layer-webview .label { color: var(--color-text); }

  /* L4 WebContentsView · simulator Chromium DevTools (the "Console" tab)
     Bounds come from the ViewAnchor-published rect of the bottom debug panel's
     Console placeholder (publishSimulatorDevtoolsBounds → setSimulatorDevtoolsBounds),
     NOT from the legacy computeSimulatorBounds/computeRightPanelBounds fallback.
     So it sits over the Console area of the BOTTOM debug region (right column,
     below the editor): left≈336, top≈387 (below the tab bar), right=14, bottom=14. */
  .layer-devtools {
    --bg: var(--color-devtools);
    --bd: var(--color-devtools-border);
    top: 387px; left: 336px;
    right: 14px; bottom: 14px;
    transform: translateZ(210px);
    background: var(--bg);
    border: 1.5px solid var(--bd);
  }
  .layer-devtools::before {
    /* devtools tab header strip */
    content: "Console  Elements  Network  Sources";
    position: absolute;
    left: 0; right: 0; top: 0;
    height: 16px;
    border-bottom: 1px solid var(--color-devtools-border);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 7.5px;
    color: hsl(220 15% 78%);
    padding: 2px 8px;
    background: hsl(220 10% 22%);
    letter-spacing: 0.08em;
  }
  .layer-devtools .label { color: hsl(220 15% 85%); }

  /* L5 WebContentsView · settings
     computeSettingsBounds: 320px wide on right edge. 320/1280≈25% → use ~190px in 760-wide stack */
  .layer-settings {
    --bg: var(--color-settings);
    --bd: var(--color-settings-border);
    top: 36px; right: 14px;
    bottom: 14px;
    width: 190px;
    transform: translateZ(260px);
    background: var(--bg);
    border: 1.5px solid var(--bd);
  }
  .layer-settings::before {
    content: "";
    position: absolute;
    left: 8px; right: 8px; top: 10px; height: 1px;
    background: hsl(180 35% 55%);
    box-shadow:
      0 8px 0 hsl(0 0% 40%),
      0 16px 0 hsl(0 0% 40%),
      0 28px 0 hsl(0 0% 40%),
      0 36px 0 hsl(0 0% 40%);
  }
  .layer-settings .label { color: hsl(180 30% 80%); }

  /* L6 WebContentsView · popover
     computePopoverBounds is technically full content area, but visually
     drawn as a centered modal-like rectangle for clarity. */
  .layer-popover {
    top: 160px; left: 220px;
    width: 320px; height: 200px;
    transform: translateZ(310px);
    background: var(--color-popover-fill);
    border: 1.5px dashed var(--color-popover-border);
  }
  .layer-popover .label { color: var(--color-popover-border); }

  /* ── Hover ───────────────────────────────────────────────────────── */
  .stack:hover .layer:not(.is-hidden) { opacity: 0.30; }
  .stack .layer:not(.is-hidden):hover {
    opacity: 1;
    box-shadow: 0 0 0 2px var(--color-accent), 0 18px 36px hsl(0 0% 0% / 0.7);
  }
  .stack .layer:not(.is-hidden):hover .label { color: var(--color-accent); }

  /* ── Legend ──────────────────────────────────────────────────────── */
  .legend {
    align-self: start;
    position: sticky;
    top: 48px;
    border: 1px solid hsl(0 0% 24%);
    border-radius: 8px;
    background: var(--color-bg-panel);
    overflow: hidden;
  }
  .legend-head {
    padding: 11px 14px;
    border-bottom: 1px solid hsl(0 0% 22%);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--color-text-secondary);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .legend-head .all-btn {
    border: 1px solid hsl(0 0% 30%);
    background: transparent;
    color: var(--color-text-secondary);
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 3px;
    cursor: pointer;
    font-family: inherit;
  }
  .legend-head .all-btn:hover { color: var(--color-accent); border-color: var(--color-accent); }

  /* tree */
  .tree {
    padding: 12px 14px 16px 14px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11.5px;
    color: var(--color-text);
  }
  .tree .branch {
    position: relative;
    margin-left: 10px;
    padding-left: 14px;
    border-left: 1px dashed hsl(0 0% 30%);
  }
  .tree .node {
    position: relative;
    display: flex; align-items: center; gap: 8px;
    padding: 4px 4px;
    transition: background 160ms ease, opacity 160ms ease;
    user-select: none;
  }
  .tree .branch > .node::before {
    content: "";
    position: absolute;
    left: -14px; top: 50%;
    width: 10px; height: 1px;
    border-top: 1px dashed hsl(0 0% 30%);
  }

  .tree .node.native { cursor: pointer; border-radius: 3px; }
  .tree .node.native:hover { background: hsl(0 0% 16%); }
  .tree .node.native.is-active { background: hsl(249 100% 67% / 0.08); }
  .tree .node.native.is-active .name { color: var(--color-accent); }
  .tree .node.native.is-active .kind { color: var(--color-accent); border-color: var(--color-accent); }
  .tree.has-hover .node.native:not(.is-active) { opacity: 0.4; }

  .tree .node.native .eye {
    width: 28px; height: 28px;
    flex-shrink: 0;
    border-radius: 4px;
    border: 1px solid hsl(0 0% 32%);
    background: hsl(0 0% 14%);
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--color-text);
    transition: background 160ms ease, border-color 160ms ease, color 160ms ease;
    cursor: pointer;
  }
  .tree .node.native .eye:hover { border-color: var(--color-accent); color: var(--color-accent); }
  .tree .node.native.is-hidden .eye { background: transparent; color: var(--color-text-muted); }
  .tree .node.native.is-hidden .name { color: var(--color-text-muted); text-decoration: line-through; text-decoration-color: hsl(0 0% 35%); }

  .tree .swatch {
    width: 9px; height: 9px;
    border-radius: 2px;
    border: 1px solid hsl(0 0% 50%);
    flex-shrink: 0;
  }
  .tree .node[data-layer="window"]       .swatch { background: var(--color-window); border-color: var(--color-window-border); }
  .tree .node[data-layer="contentview"]  .swatch { background: transparent; border: 1.5px dashed var(--color-view-border); }
  .tree .node[data-layer="mainweb"]      .swatch { background: var(--color-webcontents); border-color: var(--color-webcontents-border); }
  .tree .node[data-layer="webview"]      .swatch { background: var(--color-webview); border-color: var(--color-webview-border); }
  .tree .node[data-layer="devtools"]     .swatch { background: var(--color-devtools); border-color: var(--color-devtools-border); }
  .tree .node[data-layer="settings"]     .swatch { background: var(--color-settings); border-color: var(--color-settings-border); }
  .tree .node[data-layer="popover"]      .swatch { background: var(--color-popover-fill); border: 1.5px dashed var(--color-popover-border); }

  .tree .node .name { flex: 1; color: var(--color-text); font-size: 12px; }
  .tree .node .z { font-size: 10px; color: var(--color-text-muted); }
  .tree .node .kind {
    font-size: 9.5px;
    color: var(--color-text-muted);
    padding: 1px 5px;
    border: 1px solid hsl(0 0% 26%);
    border-radius: 3px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .tree .node.dom { padding: 3px 4px; }
  .tree .node.dom .name { color: var(--color-text-secondary); font-size: 11px; }

  .tree .node.cdp { padding: 3px 4px; }
  .tree .node.cdp .name { color: var(--color-cdp); font-size: 11px; }
  .tree .node.cdp .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--color-cdp);
    box-shadow: 0 0 6px var(--color-cdp);
    flex-shrink: 0;
  }
  .tree .node.cdp .kind { color: var(--color-cdp); border-color: var(--color-cdp); }
</style>
</head>
<body>
  <div class="page-grid">
    <section class="stage" aria-label="layered diagram">
      <div class="stack">
        <div class="layer layer-window" data-layer="window">
          <div class="back-face"></div>
          <div class="titlebar"></div>
          <div class="traffic"></div>
          <span class="label lg">BrowserWindow</span>
        </div>

        <div class="layer layer-contentview" data-layer="contentview">
          <span class="label lg">View</span>
        </div>

        <div class="layer layer-mainweb" data-layer="mainweb">
          <div class="back-face"></div>
          <div class="dom-toolbar">
            <div class="btn">编译</div>
            <div class="spacer"></div>
          </div>
          <div class="dom-splitter"></div>
          <div class="dom-hsplitter"></div>
          <div class="dom-sim-region">
            <div class="topbar">
              <div class="sel">iPhone 14</div>
              <div class="sel" style="width:42px">100%</div>
            </div>
            <div class="webview-slot"></div>
          </div>
          <div class="dom-editor-region">
            <div class="gutter"></div>
            <div class="code"><i></i><i></i><i></i><i></i><i></i></div>
            <span class="region-note">Monaco · in-renderer DOM (无独立 view)</span>
          </div>
          <div class="dom-debug-region">
            <div class="tabs-bar">
              <span>WXML</span><span>AppData</span><span>Storage</span><span class="active">Console</span>
            </div>
            <div class="rows"><i></i><i></i><i></i></div>
          </div>
          <span class="label lg">WebContentsView</span>
        </div>

        <div class="layer layer-webview" data-layer="webview">
          <div class="back-face"></div>
          <span class="label">&lt;webview&gt;</span>
        </div>

        <div class="layer layer-devtools" data-layer="devtools">
          <div class="back-face"></div>
          <span class="label">WebContentsView</span>
        </div>

        <div class="layer layer-settings" data-layer="settings">
          <div class="back-face"></div>
          <span class="label">WebContentsView</span>
        </div>

        <div class="layer layer-popover" data-layer="popover">
          <span class="label">WebContentsView</span>
        </div>
      </div>
    </section>

    <aside class="legend" id="legend">
      <div class="legend-head">
        <span>Layers</span>
        <div style="display:flex; gap:6px;">
          <button class="all-btn" id="viewBtn" title="切换 3D / 正面视角">3D 视角</button>
          <button class="all-btn" id="allBtn">全部显示</button>
        </div>
      </div>

      <!-- Populated by script from LAYERS + TREE config -->
      <div class="tree" id="tree"></div>
    </aside>
  </div>

  <script>
  (() => {
    // ─── Layer metadata: single source of truth ─────────────────────
    // Add a new layer here AND add a matching <div class="layer layer-{id}"
    // data-layer="{id}"> in the stage. Tree is rendered from this + TREE.
    const LAYERS = {
      window:      { name: 'BrowserWindow',    z: 0 },
      contentview: { name: 'View',             z: 1, kind: 'container' },
      mainweb:     { name: 'WebContentsView',  z: 2, kind: 'main' },
      webview:     { name: '<webview>',        z: 3, kind: 'guest' },
      devtools:    { name: 'WebContentsView',  z: 4, kind: 'DevTools' },
      settings:    { name: 'WebContentsView',  z: 5, kind: 'settings', hidden: true },
      popover:     { name: 'WebContentsView',  z: 6, kind: 'popover',  hidden: true },
    };

    // ─── Tree hierarchy ─────────────────────────────────────────────
    // Mirrors runtime containment, NOT DOM nesting of the stage. DOM
    // sub-regions appear as dimmer leaves under the layer that paints them.
    const TREE = [
      { layer: 'window', children: [
        { layer: 'contentview', children: [
          { layer: 'mainweb', children: [
            { dom: 'ProjectToolbar' },
            { dom: 'SimulatorPanel', children: [{ layer: 'webview' }] },
            { dom: 'MonacoEditor' },
            { dom: 'BottomDebugPanel · WXML / AppData / Storage / Console' },
          ]},
          { layer: 'devtools' },
          { layer: 'settings' },
          { layer: 'popover' },
        ]},
      ]},
    ];

    const EYE_OPEN = '<svg viewBox="0 0 16 16" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M1.5 8 C 3.5 4.5, 5.5 3.5, 8 3.5 C 10.5 3.5, 12.5 4.5, 14.5 8 C 12.5 11.5, 10.5 12.5, 8 12.5 C 5.5 12.5, 3.5 11.5, 1.5 8 Z"/><circle cx="8" cy="8" r="2"/></svg>';
    const EYE_OFF  = '<svg viewBox="0 0 16 16" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M2 8 C 4 5, 6 4, 8 4 C 10 4, 12 5, 14 8"/><line x1="3" y1="3" x2="13" y2="13"/></svg>';

    const esc = s => s.replace(/[<>&]/g, c => ({ '<': '&lt;', '>': '&gt;', '&': '&amp;' }[c]));

    // ─── Render tree from spec ──────────────────────────────────────
    function renderNode(node) {
      let html, children = '';
      if (node.children?.length) {
        children = '<div class="branch">' + node.children.map(renderNode).join('') + '</div>';
      }
      if (node.dom) {
        html = `<div class="node dom"><span class="name">${esc(node.dom)}</span><span class="kind">DOM</span></div>`;
      } else {
        const m = LAYERS[node.layer];
        const kind = m.kind ? `<span class="kind">${m.kind}</span>` : '';
        html = `<div class="node native" data-layer="${node.layer}">` +
               `<button class="eye" aria-label="toggle">${EYE_OPEN}</button>` +
               `<span class="swatch"></span>` +
               `<span class="name">${esc(m.name)}</span>${kind}` +
               `<span class="z">z${m.z}</span></div>`;
      }
      return html + children;
    }

    const tree = document.getElementById('tree');
    tree.innerHTML = TREE.map(renderNode).join('');

    // ─── Interactions ───────────────────────────────────────────────
    const stack = document.querySelector('.stack');
    const layers = [...stack.querySelectorAll('.layer')];
    const items = [...tree.querySelectorAll('.node.native')];
    const viewBtn = document.getElementById('viewBtn');
    const allBtn = document.getElementById('allBtn');

    const findLayer = id => layers.find(l => l.dataset.layer === id);
    const findItem  = id => items .find(i => i.dataset.layer === id);

    function setHidden(id, hidden) {
      const layer = findLayer(id), item = findItem(id);
      if (!layer || !item) return;
      layer.classList.toggle('is-hidden', hidden);
      item.classList.toggle('is-hidden', hidden);
      item.querySelector('.eye').innerHTML = hidden ? EYE_OFF : EYE_OPEN;
    }
    function setActive(id) {
      items.forEach(i => i.classList.toggle('is-active', i.dataset.layer === id));
      tree.classList.toggle('has-hover', Boolean(id));
    }
    function highlightFromTree(id) {
      setActive(id);
      layers.forEach(l => {
        if (l.classList.contains('is-hidden')) return;
        l.style.opacity = l.dataset.layer === id ? '1' : '0.30';
        l.style.boxShadow = l.dataset.layer === id
          ? '0 0 0 2px var(--color-accent), 0 18px 36px hsl(0 0% 0% / 0.7)' : '';
      });
    }
    function clearHighlight() {
      setActive(null);
      layers.forEach(l => { l.style.opacity = ''; l.style.boxShadow = ''; });
    }

    // Initial hidden state from LAYERS config
    Object.entries(LAYERS).forEach(([id, m]) => { if (m.hidden) setHidden(id, true); });

    layers.forEach(l => {
      l.addEventListener('mouseenter', () => !l.classList.contains('is-hidden') && setActive(l.dataset.layer));
      l.addEventListener('mouseleave', () => setActive(null));
    });
    items.forEach(it => {
      it.addEventListener('mouseenter', () => !it.classList.contains('is-hidden') && highlightFromTree(it.dataset.layer));
      it.addEventListener('mouseleave', clearHighlight);
      it.querySelector('.eye').addEventListener('click', e => {
        e.stopPropagation();
        const id = it.dataset.layer;
        setHidden(id, !findLayer(id).classList.contains('is-hidden'));
      });
    });

    allBtn.addEventListener('click', () => Object.keys(LAYERS).forEach(id => setHidden(id, false)));

    // View toggle: start flat → 700ms → rotate to 3D (gives the reader
    // time to read labels before perspective kicks in).
    function setView(flat) {
      stack.classList.toggle('flat', flat);
      viewBtn.textContent = flat ? '3D 视角' : '正面视角';
    }
    setView(true);
    setTimeout(() => setView(false), 700);
    viewBtn.addEventListener('click', () => setView(!stack.classList.contains('flat')));
  })();
  </script>
</body>
</html>
