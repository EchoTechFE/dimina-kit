appId: com.dimina.devtools
productName: Dimina DevTools
directories:
  output: release
# Override package.json "main" for the packaged app only.
# Source main points to the library API (api.js), but Electron needs the
# entry that actually calls launch() — dist/main/index.js.
extraMetadata:
  main: dist/main/index.js
files:
  - dist/**/*
  - package.json
  - '!**/*.map'
asarUnpack:
  - '**/node_modules/esbuild/**'
  - '**/node_modules/@esbuild/**'
linux:
  target: dir
  category: Development
mac:
  target: dmg
  category: public.app-category.developer-tools
win:
  target: dir
publish: null
