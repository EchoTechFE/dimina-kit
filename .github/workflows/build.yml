name: Build

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            artifact-path: packages/devtools/release/linux-unpacked
          - os: macos-latest
            platform: mac
            artifact-path: packages/devtools/release/*.dmg
          - os: windows-latest
            platform: win
            artifact-path: packages/devtools/release/win-unpacked

    runs-on: ${{ matrix.os }}

    steps:
      - name: Rewrite submodule SSH URL to HTTPS
        shell: bash
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Install dimina/fe deps
        working-directory: dimina/fe
        run: pnpm install --no-frozen-lockfile

      - name: Build dimina container
        run: pnpm --filter @dimina-kit/devtools build:container

      - name: Build devtools
        run: pnpm run build

      - name: Package Electron app
        working-directory: packages/devtools
        run: pnpm dist --${{ matrix.platform }} --publish never

      - uses: actions/upload-artifact@v7
        with:
          name: dimina-devtools-${{ matrix.platform }}
          path: ${{ matrix.artifact-path }}
          retention-days: 30
          if-no-files-found: error
