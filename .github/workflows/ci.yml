name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

# A newer push to the same ref supersedes the running verification — cancel it
# instead of finishing a result nobody will read.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # lint + check-types need no test artifacts, so they run on their own runner
  # in parallel with the test/ratchet job instead of serializing in front of it.
  lint-and-types:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Rewrite submodule SSH URL to HTTPS
        shell: bash
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      # The compiler build reads dimina submodule sources (inputs outside its
      # package dir, invisible to turbo's default hashing). The pointer file is
      # a turbo globalDependency, so a submodule bump invalidates every cache.
      - name: Record submodule revision for turbo hashing
        run: git rev-parse HEAD:dimina > .dimina-rev

      # Persist turbo's content-addressed cache across runs: unchanged
      # packages' build/lint/check-types replay instead of re-running.
      - name: Restore turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}-lint
          restore-keys: |
            turbo-${{ runner.os }}-${{ github.sha }}-
            turbo-${{ runner.os }}-

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Lint and type-check
        run: pnpm turbo run lint check-types --cache-dir=.turbo

  # ratchet consumes the test run's artifacts (test-report / coverage), so test
  # and ratchet stay serialized within this job — everything else runs beside it.
  test-and-ratchet:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Rewrite submodule SSH URL to HTTPS
        shell: bash
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      # Same submodule-pointer anchor as lint-and-types: a dimina bump must
      # invalidate the turbo cache (compiler build reads submodule sources).
      - name: Record submodule revision for turbo hashing
        run: git rev-parse HEAD:dimina > .dimina-rev

      # Persist turbo's cache: a cache-hit test task replays its recorded
      # outputs (test-report*.json + coverage/**) — exactly the artifacts the
      # ratchet step consumes, so replayed packages still feed the gate.
      - name: Restore turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}-test
          restore-keys: |
            turbo-${{ runner.os }}-${{ github.sha }}-
            turbo-${{ runner.os }}-

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Test
        run: pnpm turbo run test --cache-dir=.turbo

      - name: Anti-regression ratchet
        run: |
          set -o pipefail
          pnpm exec tsc -p tools/ratchet
          node --test "tools/ratchet/*.test.ts"
          pnpm ratchet:check 2>&1 | tee ratchet-check.log

      # Upserts one sticky comment (keyed by the marker) with the ratchet
      # table, so the PR always shows the latest baseline-vs-current state
      # without stacking a new comment per push.
      - name: Ratchet report PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            let log = ''
            try { log = fs.readFileSync('ratchet-check.log', 'utf8') } catch { return }
            const start = log.indexOf('metric ')
            const table = (start === -1 ? log : log.slice(start)).replace(/ ELIFECYCLE.*$/ms, '').trim()
            if (!table) return
            const marker = '<!-- ratchet-report -->'
            const body = `${marker}\n### Anti-regression ratchet\n\n\`\`\`\n${table}\n\`\`\`\n`
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, per_page: 100,
            })
            const existing = comments.find(c => c.body && c.body.includes(marker))
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              })
            }

      - name: Anti-regression baseline guard
        if: github.event_name == 'pull_request'
        run: |
          git fetch --depth=1 origin "$GITHUB_BASE_REF"
          node tools/ratchet/ratchet.ts baseline-guard FETCH_HEAD
