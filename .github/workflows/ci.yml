name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

# A newer push to the same ref supersedes the running verification — cancel it
# instead of finishing a result nobody will read.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # lint + check-types need no test artifacts, so they run on their own runner
  # in parallel with the test/gate job instead of serializing in front of it.
  lint-and-types:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Rewrite submodule SSH URL to HTTPS
        shell: bash
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      # The compiler build reads dimina submodule sources (inputs outside its
      # package dir, invisible to turbo's default hashing). The pointer file is
      # a turbo globalDependency, so a submodule bump invalidates every cache.
      - name: Record submodule revision for turbo hashing
        run: git rev-parse HEAD:dimina > .dimina-rev

      # Persist turbo's content-addressed cache across runs: unchanged
      # packages' build/lint/check-types replay instead of re-running.
      - name: Restore turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}-lint
          restore-keys: |
            turbo-${{ runner.os }}-${{ github.sha }}-
            turbo-${{ runner.os }}-

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Lint and type-check
        run: pnpm turbo run lint check-types --cache-dir=.turbo

  # gate consumes the test run's artifacts (test-report / coverage), so test
  # and gate stay serialized within this job — everything else runs beside it.
  test-and-pawl:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Rewrite submodule SSH URL to HTTPS
        shell: bash
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      # Same submodule-pointer anchor as lint-and-types: a dimina bump must
      # invalidate the turbo cache (compiler build reads submodule sources).
      - name: Record submodule revision for turbo hashing
        run: git rev-parse HEAD:dimina > .dimina-rev

      # Persist turbo's cache: a cache-hit test task replays its recorded
      # outputs (test-report*.json + coverage/**) — exactly the artifacts the
      # gate step consumes, so replayed packages still feed the gate.
      - name: Restore turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}-test
          restore-keys: |
            turbo-${{ runner.os }}-${{ github.sha }}-
            turbo-${{ runner.os }}-

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Test
        run: pnpm turbo run test --cache-dir=.turbo

      # Install the pawl binary through its own GitHub Action (no npm launcher
      # needed on CI); the adapters below still run via Node.
      - name: Install pawl
        uses: tiangong-dev/pawl@v0.2.0

      # pawl (Go) is the gate engine; tools/pawl keeps only the adapters
      # pawl's exec dimensions delegate to (via pawl-adapter.ts), so their
      # measure() code is guarded by the adapter tests below before the gate runs.
      # --format json gives the PR-comment step a structured verdict to render.
      - name: Anti-regression gate
        run: |
          set -o pipefail
          pnpm exec tsc -p tools/pawl
          node --test "tools/pawl/*.test.ts"
          pawl check --format json | tee gate.json

      # Upserts one sticky comment (keyed by the marker) with the gate
      # table, so the PR always shows the latest baseline-vs-current state
      # without stacking a new comment per push.
      - name: Gate report PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            let report
            try { report = JSON.parse(fs.readFileSync('gate.json', 'utf8')) } catch { return }
            if (!report || !Array.isArray(report.metrics)) return
            const cell = (v) => (v === null || v === undefined) ? '—' : String(v)
            const delta = (m) => {
              if (m.base === null || m.base === undefined) return 'new'
              const d = Math.round((m.current - m.base) * 100) / 100
              return d > 0 ? `+${d}` : `${d}`
            }
            const rows = report.metrics.map(
              (m) => `| ${m.id} | ${cell(m.base)} | ${cell(m.current)} | ${delta(m)} | ${m.status} |`,
            )
            const table = ['| metric | baseline | current | Δ | status |', '|---|---|---|---|---|', ...rows].join('\n')
            const regressed = report.metrics.filter((m) => (m.regressions || []).some((r) => !r.suppressed))
            const details = regressed.length
              ? '\n\n**Regressions**\n' + regressed.map(
                  (m) => `- \`${m.id}\` — ${m.title}\n` +
                    m.regressions.filter((r) => !r.suppressed).map((r) => `  - ${r.message}`).join('\n'),
                ).join('\n')
              : ''
            const verdict = report.exit_code === 0 ? '✅ no regressions' : '❌ regressions'
            const marker = '<!-- pawl-report -->'
            const body = `${marker}\n### Anti-regression gate — ${verdict}\n\n${table}${details}\n`
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, per_page: 100,
            })
            const existing = comments.find(c => c.body && c.body.includes(marker))
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              })
            }

      - name: Anti-regression baseline guard
        if: github.event_name == 'pull_request'
        run: |
          git fetch --depth=1 origin "$GITHUB_BASE_REF"
          pawl baseline-guard FETCH_HEAD
