name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Rewrite submodule SSH URL to HTTPS
        shell: bash
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Lint, type-check, and test
        run: pnpm turbo run lint check-types test

      - name: Anti-regression ratchet
        run: |
          pnpm exec tsc -p tools/ratchet
          node --test "tools/ratchet/*.test.ts"
          pnpm ratchet:check

      - name: Upload coverage summaries (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summaries
          path: packages/*/coverage/**/coverage-summary.json

      - name: Anti-regression baseline guard
        if: github.event_name == 'pull_request'
        run: |
          git fetch --depth=1 origin "$GITHUB_BASE_REF"
          node tools/ratchet/ratchet.ts baseline-guard FETCH_HEAD
