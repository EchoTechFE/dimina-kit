name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

# A newer push to the same ref supersedes the running verification — cancel it
# instead of finishing a result nobody will read.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # lint + check-types need no test artifacts, so they run on their own runner
  # in parallel with the test/gate job instead of serializing in front of it.
  lint-and-types:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Rewrite submodule SSH URL to HTTPS
        shell: bash
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      # The compiler build reads dimina submodule sources (inputs outside its
      # package dir, invisible to turbo's default hashing). The pointer file is
      # a turbo globalDependency, so a submodule bump invalidates every cache.
      - name: Record submodule revision for turbo hashing
        run: git rev-parse HEAD:dimina > .dimina-rev

      # Persist turbo's content-addressed cache across runs: unchanged
      # packages' build/lint/check-types replay instead of re-running.
      - name: Restore turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}-lint
          restore-keys: |
            turbo-${{ runner.os }}-${{ github.sha }}-
            turbo-${{ runner.os }}-

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile --ignore-scripts

      # dimina/fe is its own pnpm workspace (outside the root pnpm-workspace.yaml,
      # and it doesn't commit a lockfile — fe/.gitignore excludes pnpm-lock.yaml),
      # so its dependencies aren't installed by the step above and there is no
      # lockfile to freeze against. The wasm-alignment check below resolves the
      # toolchain from this install to detect drift against upstream.
      - name: Install dimina/fe workspace deps
        run: pnpm -C dimina/fe install --no-frozen-lockfile --ignore-scripts

      # Deliberately NOT run through `turbo run lint`: dimina/fe has no committed
      # lockfile, so the upstream toolchain version this check resolves can drift
      # purely from time passing (a new oxc-parser/esbuild patch landing upstream)
      # with none of packages/compiler's own tracked files changing. Turbo's task
      # cache is keyed off exactly those tracked files, so a cached run would
      # silently replay a stale pass and hide the drift this check exists to catch.
      - name: Check wasm toolchain alignment with upstream
        run: pnpm --filter @dimina-kit/compiler run check:wasm-alignment

      - name: Lint and type-check
        run: pnpm turbo run lint check-types --cache-dir=.turbo

  # gate consumes the test run's artifacts (test-report / coverage), so test
  # and gate stay serialized within this job — everything else runs beside it.
  test-and-pawl:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Rewrite submodule SSH URL to HTTPS
        shell: bash
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      # Same submodule-pointer anchor as lint-and-types: a dimina bump must
      # invalidate the turbo cache (compiler build reads submodule sources).
      - name: Record submodule revision for turbo hashing
        run: git rev-parse HEAD:dimina > .dimina-rev

      # Persist turbo's cache: a cache-hit test task replays its recorded
      # outputs (test-report*.json + coverage/**) — exactly the artifacts the
      # gate step consumes, so replayed packages still feed the gate.
      - name: Restore turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}-test
          restore-keys: |
            turbo-${{ runner.os }}-${{ github.sha }}-
            turbo-${{ runner.os }}-

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Test
        run: pnpm turbo run test --cache-dir=.turbo

      # pawl's exec dimensions delegate to the TypeScript adapters in tools/pawl
      # (via pawl-adapter.ts); compile them and run their guarding tests before
      # the gate invokes them.
      - name: Build & test pawl adapters
        run: |
          set -o pipefail
          pnpm exec tsc -p tools/pawl
          node --test "tools/pawl/*.test.ts"

      # setup-pawl installs the binary, runs `check`, and (comment defaults on)
      # upserts one sticky baseline-vs-current comment on the PR rendered from
      # the --format json verdict, then enforces the gate exit code. The install
      # leaves pawl on PATH, so baseline-guard below reuses it.
      - name: Anti-regression gate
        uses: tiangong-dev/pawl@v0.4.0
        with:
          command: check

      - name: Anti-regression baseline guard
        if: github.event_name == 'pull_request'
        run: |
          git fetch --depth=1 origin "$GITHUB_BASE_REF"
          pawl baseline-guard FETCH_HEAD
